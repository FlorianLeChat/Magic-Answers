stages:
    - lint
    - build
    - deploy

default:
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - .npm
        policy: pull-push
    before_script:
        - npm ci --cache .npm --prefer-offline

lint:eslint:
    stage: lint
    image: node:22-alpine
    script:
        - npm run lint
    artifacts:
        when: always
        reports:
            codequality: gl-codequality.json
        expire_in: 1 hour

build:node:
    stage: build
    image: node:22-alpine
    script:
        - export PUBLIC_VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
        - npm run build
    artifacts:
        paths:
            - build/
        expire_in: 1 hour
    dependencies: []

deploy:pages:
    stage: deploy
    image: alpine:3
    rules:
        - if: $CI_COMMIT_TAG
          when: on_success
        - if: $CI_COMMIT_BRANCH
          when: manual
    pages:
        publish: build
    before_script: []
    script:
        - echo 'Deploy to GitLab Pages'
    artifacts:
        expire_in: 1 hour
    dependencies:
        - build:node
    allow_failure: false
