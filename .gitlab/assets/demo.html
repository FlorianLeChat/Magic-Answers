<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Answer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5e6f0 0%, #e8d5e8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #2d2d2d;
        }

        header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 35px;
            height: 35px;
        }

        .toggle-container {
            background: white;
            border-radius: 50px;
            padding: 5px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            width: 90px;
        }

        .toggle-circle {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #ff9a56 0%, #ffa726 100%);
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .toggle-icon {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 40px;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff9a8a 0%, #ff6b9d 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #5d5d5d;
            margin-bottom: 40px;
        }

        .input-container {
            position: relative;
            width: 100%;
            max-width: 700px;
        }

        input {
            width: 100%;
            padding: 20px 60px 20px 25px;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            outline: none;
            transition: box-shadow 0.3s ease;
        }

        input:focus {
            box-shadow: 0 6px 25px rgba(0,0,0,0.15);
        }

        .shuffle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #e8b4f0 0%, #d8a4e0 100%);
            border: none;
            border-radius: 10px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-size: 20px;
        }

        .shuffle-btn:hover {
            transform: translateY(-50%) scale(1.1);
        }

        .answer-card {
            background: white;
            border-radius: 20px;
            padding: 80px 60px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .heart-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            background: radial-gradient(ellipse at center, 
                rgba(255, 107, 157, 0.6) 0%, 
                rgba(255, 107, 157, 0.4) 30%,
                rgba(255, 107, 157, 0.2) 50%,
                transparent 70%);
            border-radius: 50%;
            filter: blur(30px);
        }

        .answer-text {
            position: relative;
            z-index: 1;
            font-size: 1.3rem;
            font-weight: 500;
            color: #2d2d2d;
        }

        footer {
            text-align: right;
            padding: 20px 40px;
            font-size: 0.9rem;
            color: #7d7d7d;
        }

        .footer-heart {
            color: #ff6b9d;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .answer-card {
                padding: 60px 40px;
            }
            
            .heart-background {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <header>
        <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" fill="#6b4c7a" stroke="#6b4c7a" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" fill="white"/>
        </svg>
        <div class="toggle-container">
            <div class="toggle-circle"></div>
            <div class="toggle-icon">🌙</div>
        </div>
    </header>

    <main>
        <div class="icon-container">
            🔮
        </div>

        <div style="text-align: center;">
            <h1>Magic Answer</h1>
            <p class="subtitle">Demandez n'importe quoi ! Magic Answer y répondra.</p>
        </div>

        <div class="input-container">
            <input type="text" placeholder="Est-ce que les poules ont des dents ?" value="Est-ce que les poules ont des dents ?">
            <button class="shuffle-btn">🎲</button>
        </div>

        <div class="answer-card">
            <div class="heart-background"></div>
            <p class="answer-text">Ne comptez pas là dessus</p>
        </div>
    </main>

    <footer>
        Made with <span class="footer-heart">♥</span><br>
        By Claire and Florian
    </footer>
</body>
</html>
